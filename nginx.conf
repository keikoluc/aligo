server {
    listen 10000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The Flutter web app now lives under /app/ (built with
    # --base-href /app/) — only it needs the SPA fallback so client-side
    # routing/deep links resolve to its index.html.
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # Root "/" and "/download/" are the static landing page and the APK
    # download page — plain files, no SPA fallback needed.
    location / {
        try_files $uri $uri/ =404;
    }
}
