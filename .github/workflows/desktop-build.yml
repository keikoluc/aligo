name: Desktop builds

# Builds release desktop binaries for all three platforms. GitHub's
# hosted runners give us real Windows/macOS/Linux machines — this exists
# specifically because the dev sandbox this project started in only has
# Linux, and its Flutter install (a snap package) has a broken bundled
# linker that blocks even local Linux desktop builds. These runners use
# a normal Flutter install and don't hit that problem.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  FLUTTER_VERSION: '3.41.6'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - run: flutter config --enable-linux-desktop
      - run: flutter pub get
      - run: flutter build linux --release
      - uses: actions/upload-artifact@v4
        with:
          name: aligo-linux
          path: build/linux/x64/release/bundle/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: aligo-windows
          path: build/windows/x64/runner/Release/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      # Unsigned build — fine to run locally, but macOS Gatekeeper will
      # block it for other people until it's code-signed with an Apple
      # Developer ID (see the iOS discussion; same account covers both).
      - run: flutter build macos --release --no-codesign
      - uses: actions/upload-artifact@v4
        with:
          name: aligo-macos
          path: build/macos/Build/Products/Release/aligo.app
